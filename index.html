<!DOCTYPE html>
<html>
<head>
    <title>BTSAI Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #121212; color: white; }
        h1 { margin-bottom: 30px; color: #fff; }
        .btn { 
            display: block; 
            padding: 25px; 
            margin: 15px auto; 
            max-width: 400px;
            background: #2c2c2c; 
            color: #00ffcc; 
            text-decoration: none; 
            border-radius: 12px; 
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid #444;
            transition: 0.3s;
        }
        .btn:hover { background: #383838; border-color: #00ffcc; }
    </style>
</head>
<body>
    <h1>BTSAI Arcade</h1>
    <a class="btn" href="./realm-chess/">Play Chess</a>
    <a class="btn" href="./cosmic-blackjack/">Play Blackjack</a>
</body>
</html>
