<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTSAI Arcade | Premium</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Modern Mesh Gradient Background */
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Glassmorphism Header */
        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 300;
            font-size: 2.2rem;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        /* The Glass Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1100px;
            padding-bottom: 60px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* This creates the frosted effect */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        h2 {
            font-weight: 400;
            margin: 10px 0;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        .play-hint {
            font-size: 0.8rem;
            margin-top: 15px;
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Locked State */
        .locked {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .locked:hover { transform: none; }

    </style>
</head>
<body>

    <header>
        <h1>BTSAI ARCADE</h1>
        <div class="stats-row">
            <span>Level: 01</span>
            <span>•</span>
            <span>Developer: BTSAI</span>
            <span>•</span>
            <span>Status: Verified</span>
        </div>
    </header>

    <div class="grid">
        <a href="Realm-Chess/" class="glass-card">
            <div class="icon-circle">♟</div>
            <h2>REALM CHESS</h2>
            <div class="play-hint">Begin Session</div>
        </a>

        <a href="Cosmic-Blackjack/" class="glass-card">
            <div class="icon-circle">🃏</div>
            <h2>COSMIC BLACKJACK</h2>
            <div class="play-hint">Begin Session</div>
        </a>

        <div class="glass-card locked">
            <div class="icon-circle">🔒</div>
            <h2>ENCRYPTED</h2>
            <div class="play-hint">Awaiting Access</div>
        </div>

        <div class="glass-card locked">
            <div class="icon-circle">🔒</div>
            <h2>ENCRYPTED</h2>
            <div class="play-hint">Awaiting Access</div>
        </div>
    </div>

</body>
</html>
